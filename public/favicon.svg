<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1123" />
      <stop offset="100%" stop-color="#070810" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#863bff" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#1e2243" stroke-width="12" />

  <!-- Logo Mark: Modern 'P' with a success checkmark inside -->
  <g transform="translate(32, 28)" filter="url(#glow)">
    <!-- Vertical stem of 'P' -->
    <rect x="130" y="100" width="48" height="230" rx="24" fill="url(#accent-grad)" />
    
    <!-- Loop of the 'P' -->
    <path d="M130 100h110c48 0 86 38 86 86s-38 86-86 86H130" fill="none" stroke="url(#accent-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Checkmark inside the loop indicating success / placement simplification -->
    <path d="M210 176l22 22 42-42" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
